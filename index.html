<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>CRM Integration – Gantt Chart</title>
<style>
:root {
  --bg: #f5f6fa;
  --card: #ffffff;
  --border: #e0e0e0;
  --text: #333;
  --text-muted: #888;
  --primary: #2F5496;
  --primary-dark: #1a3a7a;
  --anacrm: #4472C4;
  --anacrm-light: #dce6f3;
  --grpdwh: #70AD47;
  --grpdwh-light: #e2efda;
  --crit-bg: #fef9e7;
  --crit-border: #f0d86e;
  --ms-bg: #f0f0f0;
  --qg-bar: #d4a844;
  --green: #4CAF50;
  --orange: #FF9800;
  --shadow: 0 1px 4px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 24px; line-height: 1.5; }
h1 { font-size: 22px; font-weight: 700; color: var(--primary); margin-bottom: 5px; }
.subtitle { font-size: 13px; color: #666; margin-bottom: 20px; }

.summary { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
.summary-card { background: #fff; border-radius: 8px; padding: 14px 20px; box-shadow: var(--shadow); min-width: 160px; }
.summary-card .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
.summary-card .value { font-size: 20px; font-weight: 700; color: var(--primary); margin-top: 2px; }
.summary-card .value.green { color: var(--green); }
.summary-card .value.orange { color: var(--orange); }

.controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.controls label { font-size: 12px; color: #666; }
.btn { padding: 5px 14px; border: 1px solid var(--primary); background: #fff; color: var(--primary); border-radius: 4px; cursor: pointer; font-size: 12px; transition: all .12s; }
.btn:hover { background: #f0f4ff; }
.btn.active { background: var(--primary); color: #fff; }

.legend { display: flex; gap: 16px; margin-bottom: 12px; font-size: 11px; align-items: center; flex-wrap: wrap; color: #666; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.swatch { width: 16px; height: 10px; border-radius: 2px; }

.gantt-wrap { overflow-x: auto; background: var(--card); border-radius: 8px; box-shadow: var(--shadow); }
table { border-collapse: collapse; min-width: 100%; }

thead th { position: sticky; top: 0; z-index: 10; font-size: 10px; font-weight: 600; padding: 6px 3px; text-align: center; white-space: nowrap; }
th.hdr1 { background: var(--primary-dark); color: #fff; overflow: hidden; font-size: 11px; letter-spacing: 0.5px; }
th.hdr2 { background: var(--primary); color: #fff; font-size: 9px; width: 24px; min-width: 24px; max-width: 24px; }
th.fixed { text-align: center; min-width: 40px; }
th.act { text-align: left; min-width: 250px; }

tbody tr { transition: background .15s; }
tbody tr:hover { background: #f0f4ff !important; }

td { padding: 3px 4px; font-size: 10px; border-bottom: 1px solid #eee; vertical-align: middle; }
td.id { font-weight: 700; text-align: center; color: var(--primary); }
td.id.current-enabled {
  background: #dff5e8;
  color: #166534;
  box-shadow: inset 0 0 0 1px #86efac;
  border-radius: 4px;
}
td.id.predecessor-highlight {
  background: #fde2e2;
  color: #b91c1c;
  box-shadow: inset 0 0 0 1px #fca5a5;
  border-radius: 4px;
}
td.role { text-align: center; font-weight: 600; font-size: 9px; padding: 2px 6px; border-radius: 3px; }
td.role.ana { background: var(--anacrm-light); color: var(--anacrm); }
td.role.be { background: var(--grpdwh-light); color: var(--grpdwh); }
td.sm { text-align: center; font-size: 9px; color: var(--text-muted); }
td.act { white-space: normal; word-break: break-word; max-width: 280px; font-size: 10px; }
td.act.crit { background: var(--crit-bg); border-left: 2px solid var(--crit-border); font-weight: 600; }
td.eff { text-align: center; font-size: 9px; color: var(--text-muted); }

td.wk { padding: 1px 0; position: relative; width: 24px; min-width: 24px; max-width: 24px; border-left: 1px solid #f5f5f5; }
td.wk.filled { }
.bar { position: absolute; top: 3px; bottom: 3px; left: 1px; right: 1px; border-radius: 2px; }
.bar.anacrm { background: var(--anacrm); }
.bar.grpdwh { background: var(--grpdwh); }
.bar.qg { background: var(--qg-bar); }

tr.milestone td { background: var(--ms-bg); font-style: italic; color: var(--text-muted); }
tr.phase-sep td { border-top: 2px solid var(--primary); }

.tooltip { display: none; position: fixed; background: #1a1a2e; color: #eee; padding: 10px 14px; border-radius: 8px; font-size: 11px; z-index: 100; pointer-events: none; max-width: 420px; line-height: 1.6; box-shadow: 0 4px 12px rgba(0,0,0,.2); }
.tooltip b { color: #fff; }
.tooltip .tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 600; margin-right: 4px; }
.tooltip .tag.ana { background: var(--anacrm); color: #fff; }
.tooltip .tag.be { background: var(--grpdwh); color: #fff; }
.tooltip .tag.crit { background: #f0d86e; color: #333; }

@media print { .controls, .btn { display: none; } }
</style>
</head>

const WEEKS = ["2026-03-30T00:00:00", "2026-04-06T00:00:00", "2026-04-13T00:00:00", "2026-04-20T00:00:00", "2026-04-27T00:00:00", "2026-05-04T00:00:00", "2026-05-11T00:00:00", "2026-05-18T00:00:00", "2026-05-25T00:00:00", "2026-06-01T00:00:00", "2026-06-08T00:00:00", "2026-06-15T00:00:00", "2026-06-22T00:00:00", "2026-06-29T00:00:00", "2026-07-06T00:00:00", "2026-07-13T00:00:00", "2026-07-20T00:00:00", "2026-07-27T00:00:00", "2026-08-03T00:00:00", "2026-08-10T00:00:00", "2026-08-17T00:00:00", "2026-08-24T00:00:00", "2026-08-31T00:00:00", "2026-09-07T00:00:00", "2026-09-14T00:00:00", "2026-09-21T00:00:00", "2026-09-28T00:00:00"].map(s => new Date(s.slice(0,10)+'T00:00:00'));

const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const months = [];
let cm = -1;
WEEKS.forEach((w,i) => {
  if(w.getMonth()!==cm) { months.push({label:monthNames[w.getMonth()]+' '+w.getFullYear(),short:monthNames[w.getMonth()].slice(0,3),start:i,span:1}); cm=w.getMonth(); }
  else months[months.length-1].span++;
});

let filters = {role:'all',layer:'all',source:'all'};

function positionTooltip(e) {
  const tip = document.getElementById('tip');
  const offset = 14;
  const padding = 12;

  const rect = tip.getBoundingClientRect();
  let left = e.clientX + offset;
  let top = e.clientY + offset;

  if (left + rect.width + padding > window.innerWidth) {
    left = e.clientX - rect.width - offset;
  }

  if (top + rect.height + padding > window.innerHeight) {
    top = e.clientY - rect.height - offset;
  }

  left = Math.max(padding, left);
  top = Math.max(padding, top);

  tip.style.left = left + 'px';
  tip.style.top = top + 'px';
}

function fmtDate(d) {
  return d.getDate() + '.' + (d.getMonth() + 1) + '.' + d.getFullYear();
}

function getTaskDateRange(task) {
  if(!task.x_weeks || !task.x_weeks.length) return '–';
  const starts = task.x_weeks
    .map(s => new Date(s.slice(0,10) + 'T00:00:00'))
    .filter(d => !isNaN(d));
  if(!starts.length) return '–';
  const start = new Date(Math.min(...starts.map(d => d.getTime())));
  const end = new Date(Math.max(...starts.map(d => d.getTime())));
  end.setDate(end.getDate() + 6);
  return `${fmtDate(start)} – ${fmtDate(end)}`;
}

function fmtMd(value) {
  return Number.isInteger(value) ? String(value) : value.toFixed(1);
}

function updateSummary(vis) {
  const visibleTasks = vis.filter(t => !t.is_milestone);

  document.getElementById('summary-tasks').textContent = String(visibleTasks.length);
  document.getElementById('summary-critical').textContent = String(visibleTasks.filter(t => t.is_yellow).length);

  const sumEo = visibleTasks.reduce((acc, t) => acc + (typeof t.eo === 'number' ? t.eo : 0), 0);
  const sumEp = visibleTasks.reduce((acc, t) => acc + (typeof t.ep === 'number' ? t.ep : 0), 0);
  const avgMd = (sumEo + sumEp) / 2;

  document.getElementById('summary-range').textContent = `${fmtMd(sumEo)}–${fmtMd(sumEp)} MD`;
  document.getElementById('summary-average').textContent = `${fmtMd(avgMd)} MD`;
}


function clearDependencyHighlights() {
  document.querySelectorAll('td.id.current-enabled, td.id.predecessor-highlight').forEach(cell => {
    cell.classList.remove('current-enabled', 'predecessor-highlight');
  });
}

function getDependencyIds(depString) {
  if(!depString) return [];
  return depString
    .split(/[;,]+/)
    .map(x => x.trim())
    .filter(Boolean);
}

function highlightDependencyChain(currentId, depString) {
  clearDependencyHighlights();

  getDependencyIds(depString).forEach(depId => {
    const depRow = document.querySelector(`#gt tbody tr[data-id="${depId}"] td.id`);
    if(depRow) depRow.classList.add('predecessor-highlight');
  });

  document.querySelectorAll('#gt tbody tr[data-id]').forEach(tr => {
    const rowId = tr.dataset.id;
    const rowTask = TASKS.find(x => x.id === rowId);
    if(!rowTask) return;
    const rowDeps = getDependencyIds(rowTask.deps);
    if(rowDeps.includes(currentId)) {
      const enabledCell = tr.querySelector('td.id');
      if(enabledCell) enabledCell.classList.add('current-enabled');
    }
  });
}

function render() {
  const thead = document.querySelector('#gt thead');
  const tbody = document.querySelector('#gt tbody');

  let h1='<tr>';
  h1+='<th class="hdr1 fixed" rowspan="2" style="min-width:45px">ID</th>';
  h1+='<th class="hdr1 fixed" rowspan="2" style="min-width:38px">Role</th>';
  h1+='<th class="hdr1 fixed" rowspan="2" style="min-width:62px">Layer</th>';
  h1+='<th class="hdr1 fixed" rowspan="2" style="min-width:74px">Source</th>';
  h1+='<th class="hdr1 act" rowspan="2">Activity</th>';
  h1+='<th class="hdr1 fixed" rowspan="2" style="min-width:72px">Effort</th>';
  months.forEach(m => h1+=`<th class="hdr1" colspan="${m.span}">${m.span===1?m.short:m.label}</th>`);
  h1+='</tr><tr>';
  WEEKS.forEach(w => h1+=`<th class="hdr2">${w.getDate()}.${w.getMonth()+1}.</th>`);
  h1+='</tr>';
  thead.innerHTML=h1;

  const vis = TASKS.filter(t => {
    if(t.is_milestone) return true;
    if(filters.role!=='all' && t.role!==filters.role) return false;
    if(filters.layer!=='all' && t.layer!==filters.layer) return false;
    if(filters.source!=='all' && t.source!==filters.source) return false;
    return true;
  });

  updateSummary(vis);

  let prevPhase='', rows='';
  const weekISO = WEEKS.map(w => w.getFullYear()+'-'+String(w.getMonth()+1).padStart(2,'0')+'-'+String(w.getDate()).padStart(2,'0'));

  vis.forEach(t => {
    const sep = t.phase!==prevPhase && prevPhase!=='';
    prevPhase = t.phase;
    const isMilestone = t.is_milestone && !t.id;
    const isQG = t.id==='QG-IA';

    let trCls = '';
    if(sep) trCls += ' phase-sep';
    if(isMilestone) trCls += ' milestone';

    const roleCls = t.role==='ANA'?'ana':(t.role==='BE'?'be':'');
    const actCls = t.is_yellow ? 'act crit' : 'act';

    const effText = (t.eo!==null && t.ep!==null) ? t.eo+'–'+t.ep : (t.eo!==null ? ''+t.eo : '–');

    rows += `<tr class="${trCls}" data-id="${t.id}">`;
    rows += `<td class="id">${t.id}</td>`;
    rows += `<td class="role ${roleCls}">${t.role||'–'}</td>`;
    rows += `<td class="sm">${t.layer||'–'}</td>`;
    rows += `<td class="sm">${t.source||'–'}</td>`;
    rows += `<td class="${actCls}">${t.activity.substring(0,85)+(t.activity.length>85?'…':'')}</td>`;
    rows += `<td class="eff">${effText}</td>`;

    const xSet = new Set(t.x_weeks.map(s => s.slice(0,10)));
    weekISO.forEach(wiso => {
      const filled = xSet.has(wiso);
      if(filled) {
        let barCls = 'bar ';
        if(isQG) barCls += 'qg';
        else if(t.source==='GRPDWH') barCls += 'grpdwh';
        else barCls += 'anacrm';
        rows += `<td class="wk filled"><div class="${barCls}"></div></td>`;
      } else {
        rows += '<td class="wk"></td>';
      }
    });
    rows += '</tr>';
  });

  tbody.innerHTML = rows;

  // Tooltips
  tbody.querySelectorAll('tr[data-id]').forEach(tr => {
    const id = tr.dataset.id;
    const t = TASKS.find(x=>x.id===id);
    if(!t) return;
    tr.addEventListener('mouseenter', e => {
      const tip = document.getElementById('tip');
      let tags = '';
      if(t.role) tags += `<span class="tag ${t.role.toLowerCase()}">${t.role}</span>`;
      if(t.is_yellow) tags += '<span class="tag crit">CRITICAL</span>';
      const eff = (t.eo!==null?t.eo:'?')+'–'+(t.ep!==null?t.ep:'?')+' MD';
      const wks = t.x_weeks.length + (t.x_weeks.length===1?' week':' weeks');
      const dateRange = getTaskDateRange(t);
      tip.innerHTML = `${tags}<b>[${t.id}]</b> ${t.activity}<br>
        Role: ${t.role||'–'}<br>
        Layer: ${t.layer||'–'}<br>
        Source: ${t.source||'–'}<br>
        Environment: ${t.env||'–'}<br>
        Effort estimate: ${eff} (${dateRange})<br>
        Planned duration: ${wks}<br>
        Dependencies: ${t.deps||'–'}`;
      tip.style.display='block';
      positionTooltip(e);
      highlightDependencyChain(t.id, t.deps);
    });
    tr.addEventListener('mousemove', e => {
      positionTooltip(e);
    });
    tr.addEventListener('mouseleave', ()=>{
      document.getElementById('tip').style.display='none';
      clearDependencyHighlights();
    });
  });
}

document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const f=btn.dataset.f, v=btn.dataset.v;
    document.querySelectorAll(`.btn[data-f="${f}"]`).forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    filters[f]=v;
    render();
  });
});

render();
</script>
